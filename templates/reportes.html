{% extends "base.html" %}

{% block style %}
<style>
    /* Estilos para el overlay */
    #loadingOverlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        text-align: center;
        color: white;
        padding-top: 20%;
    }

    .input-time {
        text-align: center;
    }
</style>
{% endblock %}

{% block content %}
<!-- Overlay de carga -->
<div id="loadingOverlay">
    <div>
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Cargando...</span>
        </div>
        <h2>Procesando...</h2>
    </div>
</div>

<div class="container mt-5">
    <div class="card shadow-sm border-0">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0"><i class="bi bi-file-earmark-bar-graph me-2"></i>Generar Reportes de Producción</h3>
        </div>
        <div class="card-body bg-light">
            <form id="reporteForm">
                <!-- Fila 1: Fechas -->
                <div class="row g-3 mb-3">
                    <div class="col-md-3">
                        <label for="fecha_inicio" class="form-label fw-bold">Fecha Inicio</label>
                        <input type="date" id="fecha_inicio" name="fecha_inicio" class="form-control input-time" required>
                    </div>
                    <div class="col-md-3">
                        <label for="hora_inicio" class="form-label fw-bold">Hora Inicio</label>
                        <input type="time" id="hora_inicio" name="hora_inicio" class="form-control input-time" required value="00:00">
                    </div>
                    <div class="col-md-3">
                        <label for="fecha_final" class="form-label fw-bold">Fecha Final</label>
                        <input type="date" id="fecha_final" name="fecha_final" class="form-control input-time" required>
                    </div>
                    <div class="col-md-3">
                        <label for="hora_final" class="form-label fw-bold">Hora Final</label>
                        <input type="time" id="hora_final" name="hora_final" class="form-control input-time" required value="23:59">
                    </div>
                </div>

                <!-- Fila 2: Origen de Producto, Tipo de Reporte y Botón Consultar -->
                <div class="row align-items-end g-3">
                    <div class="col-md-4">
                        <label for="origen_filtro" class="form-label fw-bold">Origen de Producto</label>
                        <select id="origen_filtro" name="origen" class="form-select">
                            <option value="todos">Todos los Productos</option>
                            <option value="propio" selected>Productos Propios</option>
                            <option value="tercero">Servicios a Terceros</option>
                        </select>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label fw-bold">Tipo de Reporte PDF:</label>
                        <div class="d-flex gap-3 pt-1">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipoReporte" id="tipoGeneral" value="general" checked>
                                <label class="form-check-label" for="tipoGeneral">
                                    General
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="tipoReporte" id="tipoDetallado" value="detallado">
                                <label class="form-check-label" for="tipoDetallado">
                                    Detallado (Día)
                                </label>
                            </div>
                            <div class="form-check" id="radioDetalladoPropioWrapper" style="display: block;">
                                <input class="form-check-input" type="radio" name="tipoReporte" id="tipoDetalladoPropio" value="detallado_propio">
                                <label class="form-check-label" for="tipoDetalladoPropio">
                                    Detallado Propio
                                </label>
                            </div>
                            <div class="form-check" id="radioDetalladoTerceroWrapper" style="display: none;">
                                <input class="form-check-input" type="radio" name="tipoReporte" id="tipoDetalladoTercero" value="detallado_tercero">
                                <label class="form-check-label" for="tipoDetalladoTercero">
                                    Detallado Tercero
                                </label>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3 text-end">
                        <button type="submit" class="btn btn-primary w-100"><i class="bi bi-search me-2"></i>Consultar</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Resultados del reporte -->
    <div id="resultadosReporte" class="mt-4"></div>
</div>

<script src="{{ url_for('static', filename='bootstrap/js/jquery.min.js') }}"></script>
<script>
    $(document).ready(function () {
        // Establecer fechas por defecto (Hoy)
        const today = new Date().toISOString().split('T')[0];
        $('#fecha_inicio').val(today);
        $('#fecha_final').val(today);

        // Manejar cambio de origen para mostrar/ocultar reportes detallados correspondientes
        $('#origen_filtro').on('change', function() {
            const val = $(this).val();
            if (val === 'propio') {
                $('#radioDetalladoPropioWrapper').show();
                $('#radioDetalladoTerceroWrapper').hide();
                if ($('#tipoDetalladoTercero').is(':checked')) {
                    $('#tipoGeneral').prop('checked', true);
                }
            } else if (val === 'tercero') {
                $('#radioDetalladoPropioWrapper').hide();
                $('#radioDetalladoTerceroWrapper').show();
                if ($('#tipoDetalladoPropio').is(':checked')) {
                    $('#tipoGeneral').prop('checked', true);
                }
            } else {
                $('#radioDetalladoPropioWrapper').hide();
                $('#radioDetalladoTerceroWrapper').hide();
                if ($('#tipoDetalladoPropio').is(':checked') || $('#tipoDetalladoTercero').is(':checked')) {
                    $('#tipoGeneral').prop('checked', true);
                }
            }
        });

        $('#reporteForm').on('submit', function (e) {
            e.preventDefault();

            const fecha_inicio = $('#fecha_inicio').val();
            const hora_inicio = $('#hora_inicio').val();
            const fecha_final = $('#fecha_final').val();
            const hora_final = $('#hora_final').val();
            const tipo_reporte = $('input[name="tipoReporte"]:checked').val();
            const origen = $('#origen_filtro').val();

            mostrarOverlay();

            $.ajax({
                url: '/admin/reportes',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({ fecha_inicio, hora_inicio, fecha_final, hora_final, origen, tipo: tipo_reporte }),
                success: function (response) {
                    $('#resultadosReporte').html('');

                    if (response.resultados && response.resultados.length > 0) {
                        // Construir tabla de vista previa
                        let tableHtml = `
                        <div class="card shadow-sm">
                            <div class="card-header bg-secondary text-white d-flex justify-content-between align-items-center">
                                <span>Vista Previa de Resultados</span>
                                <span class="badge bg-light text-dark">${response.resultados.length} Registros</span>
                            </div>
                            <div class="card-body">
                                <div class="table-responsive" style="max-height: 400px; overflow-y: auto;">
                                    <table class="table table-bordered table-hover table-sm">
                                        <thead class="table-dark sticky-top">
                                            <tr>`;

                        if (tipo_reporte === 'detallado_propio') {
                            tableHtml += `
                                                <th>Fecha</th>
                                                <th>Lote</th>
                                                <th>Producto</th>
                                                <th>Hora</th>
                                                <th>Operario</th>
                                                <th class="text-end">Peso KG</th>`;
                        } else if (tipo_reporte === 'detallado_tercero') {
                            tableHtml += `
                                                <th>Productor</th>
                                                <th>Fecha</th>
                                                <th>Nro. Bolsa</th>
                                                <th>Hora</th>
                                                <th>Lote</th>
                                                <th>Parcela</th>
                                                <th>Carga</th>
                                                <th>Zafra</th>
                                                <th class="text-end">Peso KG</th>`;
                        } else {
                            tableHtml += `
                                                <th>Producto</th>
                                                <th>Inicio</th>
                                                <th>Fin</th>
                                                <th>Bolsas</th>
                                                <th>Duración</th>
                                                <th>T. Muerto</th>
                                                <th class="text-end">Total KG</th>`;
                        }

                        tableHtml += `
                                            </tr>
                                        </thead>
                                        <tbody>`;

                        let granTotal = 0;
                        response.resultados.forEach(row => {
                            if (tipo_reporte === 'detallado_propio') {
                                tableHtml += `
                                <tr>
                                    <td>${row.fecha}</td>
                                    <td>${row.lote}</td>
                                    <td>${row.producto}</td>
                                    <td>${row.hora}</td>
                                    <td>${row.empleado || '-'}</td>
                                    <td class="fw-bold text-end">${row.peso.toFixed(1)}</td>
                                </tr>`;
                                granTotal += parseFloat(row.peso);
                            } else if (tipo_reporte === 'detallado_tercero') {
                                tableHtml += `
                                <tr>
                                    <td>${row.productor_nombre}</td>
                                    <td>${row.fecha}</td>
                                    <td>${row.bolsa}</td>
                                    <td>${row.hora}</td>
                                    <td>${row.cd || '-'}</td>
                                    <td>${row.parcela}</td>
                                    <td>${row.carga}</td>
                                    <td>${row.zafra}</td>
                                    <td class="fw-bold text-end">${row.peso.toFixed(1)}</td>
                                </tr>`;
                                granTotal += parseFloat(row.peso);
                            } else {
                                tableHtml += `
                                <tr>
                                    <td>${row.producto}</td>
                                    <td>${row.primer_pesaje}</td>
                                    <td>${row.ultimo_pesaje}</td>
                                    <td>${row.cantidad_pesajes}</td>
                                    <td>${row.horas_totales}</td>
                                    <td>${row.tiempo_muerto_horas}</td>
                                    <td class="fw-bold text-end">${row.total_peso_kg.toFixed(2)}</td>
                                </tr>`;
                                granTotal += parseFloat(row.total_peso_kg);
                            }
                        });

                        tableHtml += `
                                        </tbody>
                                    </table>
                                </div>
                                <div class="alert alert-info mt-3 fw-bold text-end">
                                    TOTAL GENERAL: ${granTotal.toLocaleString('es-AR', {minimumFractionDigits: 2})} KG
                                </div>
                                
                                <div class="d-flex justify-content-center gap-3 mt-4">
                                    <button id="generarPDF" class="btn btn-danger btn-lg">
                                        <i class="bi bi-file-earmark-pdf me-2"></i>Descargar PDF (${tipo_reporte.toUpperCase()})
                                    </button>
                                    <button id="generarExcel" class="btn btn-success btn-lg">
                                        <i class="bi bi-file-earmark-excel me-2"></i>Exportar a Excel
                                    </button>
                                </div>
                            </div>
                        </div>`;

                        $('#resultadosReporte').html(tableHtml);

                        // --- LOGICA BOTÓN PDF ---
                        $('#generarPDF').on('click', function () {
                            mostrarOverlay();
                            const currentTipo = $('input[name="tipoReporte"]:checked').val();
                            const currentOrigen = $('#origen_filtro').val();
                            
                            let params = new URLSearchParams({
                                fecha_inicio: fecha_inicio,
                                hora_inicio: hora_inicio,
                                fecha_final: fecha_final,
                                hora_final: hora_final,
                                tipo: currentTipo,
                                origen: currentOrigen
                            });

                            fetch(`/admin/reportes/pdf?${params.toString()}`)
                                .then(resp => resp.blob())
                                .then(blob => {
                                    const url = window.URL.createObjectURL(blob);
                                    window.open(url, '_blank');
                                    ocultarOverlay();
                                })
                                .catch(() => {
                                    alert('Error generando PDF');
                                    ocultarOverlay();
                                });
                        });

                        // --- LOGICA BOTÓN EXCEL ---
                        $('#generarExcel').on('click', function () {
                            const currentOrigen = $('#origen_filtro').val();
                            const currentTipo = $('input[name="tipoReporte"]:checked').val();
                            let params = new URLSearchParams({
                                fecha_inicio: fecha_inicio,
                                hora_inicio: hora_inicio,
                                fecha_final: fecha_final,
                                hora_final: hora_final,
                                origen: currentOrigen,
                                tipo: currentTipo
                            });
                            // Descarga directa
                            window.location.href = `/admin/reportes/excel?${params.toString()}`;
                        });

                    } else {
                        $('#resultadosReporte').html('<div class="alert alert-warning text-center">No se encontraron datos para el rango seleccionado.</div>');
                    }
                },
                error: function () {
                    alert('Error de conexión con el servidor.');
                },
                complete: function () {
                    ocultarOverlay();
                }
            });
        });
    });

    function mostrarOverlay() { $("#loadingOverlay").fadeIn(); }
    function ocultarOverlay() { $("#loadingOverlay").fadeOut(); }
</script>
{% endblock %}
